org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
kotlin.code.style=official
# Prevent Kotlin JVM-target validation from failing the build as an error
kotlin.jvm.target.validation.mode=warning


# ── Backend Speed & Stability Optimizations ────────────
# Parallel execution for faster compilation
org.gradle.parallel=true
# Enable build caching to reuse outputs
org.gradle.caching=true
# Configure projects on demand to reduce memory usage
org.gradle.configureondemand=true
# Use R8 full mode for smaller, faster APKs
android.enableR8.fullMode=true
# Reduce size by not using transitive R classes
android.nonTransitiveRClass=true
# Legacy Kotlin Gradle Plugin compatibility for plugins not yet on built-in Kotlin
# (home_widget, image_picker_android). Required until those plugins migrate.
# See: https://docs.flutter.dev/release/breaking-changes/migrate-to-built-in-kotlin
android.builtInKotlin=false
android.newDsl=false
