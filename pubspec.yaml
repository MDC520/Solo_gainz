name: solo_gainz
description: "A hybrid fitness tracker and combat dungeon game."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^7.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4
  encrypt: ^5.0.3
  crypto: ^3.0.3
  image_picker: ^1.1.0
  image_cropper: ^8.0.0
  path_provider: ^2.1.5
  permission_handler: ^11.3.0
  home_widget: 0.9.1
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "Assets/icon.png"

flutter:
  uses-material-design: true

  fonts:
    - family: BoldPixels
      fonts:
        - asset: Assets/Fonts/BoldPixels.ttf
  assets:
    - Assets/
    - Assets/Player Model/Idle/
    - Assets/Player Model/Walk/
    - Assets/Player Model/Run/
    - Assets/Player Model/Sprint/
    - Assets/Player Model/Jump/
    - Assets/Player Model/Push/
    - Assets/Player Model/Pull/
    - Assets/Player Model/PushIdle/
    - Assets/Player Model/Hit/
    - Assets/Player Model/GetUp/
    - Assets/Player Model/Knockback/
    - Assets/Player Model/Stunned/
    - Assets/Player Model/Kick01/
    - Assets/Player Model/Kick02/
    - Assets/Player Model/Kick03/
    - Assets/Player Model/Punch01/
    - Assets/Player Model/Punch02/
    - Assets/Player Model/Punch03/
    - Assets/Player Model/Roll/
    - Assets/Player Model/Slide/
    - Assets/Player Model/Land/
    - Assets/Player Model/ShockLight/
    - Assets/Player Model/ShockHeavy/
    - Assets/Player Model/LadderClimb/
    - Assets/Player Model/LadderClimbFinish/
    - Assets/Player Model/LadderClimbHorizontal/
    - Assets/Player Model/ThrowOverarm/
    - Assets/Player Model/ThrowUnderarm/
    - Assets/Rank Shields/
    - Assets/Chests/Wooden Chest/Idle/
    - Assets/Chests/Wooden Chest/open/
    - Assets/Chests/Iron Chest/Idle/
    - Assets/Chests/Iron Chest/Open/
    - Assets/Chests/Gold Chest/idle/
    - Assets/Chests/Gold Chest/oepn/
    - Assets/Chests/Mysterious Chest/Idle/
    - Assets/Chests/Mysterious Chest/open/
