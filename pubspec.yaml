name: solo_gainz
description: "A hybrid fitness tracker and combat dungeon game."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  # Core
  flutter:
    sdk: flutter

  # Storage & security
  flutter_secure_storage: ^9.2.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Crypto
  crypto: ^3.0.3
  encrypt: ^5.0.3

  # UI
  google_fonts: ^7.0.0

  # Media
  image_cropper: ^8.0.0
  image_picker: ^1.2.2

  # Platform
  home_widget: ^0.9.1
  path_provider: ^2.1.5
  permission_handler: ^11.3.0

  # Notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2

dev_dependencies:
  build_runner: ^2.4.0
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icon.png

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png
    - assets/Player Model/
    - assets/Rank Shields/
    - assets/Chests/
